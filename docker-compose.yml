services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: ./backend/.env
        format: raw
    environment:
      - MLFLOW_TRACKING_URI=
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./mlops/config:/app/mlops/config
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  jenkins:
    profiles: ["cd"]
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    volumes:
      - jenkins-data:/var/jenkins_home
    ports:
      - "8080:8080"

volumes:
  grafana-data:
  jenkins-data:
