stages:
  extract:
    cmd: python mlops/pipelines/01_extract.py
    deps:
      - mlops/pipelines/01_extract.py
      - backend
    outs:
      - data/raw

  validate:
    cmd: python mlops/pipelines/02_validate.py
    deps:
      - mlops/pipelines/02_validate.py
      - data/raw
    outs:
      - reports/data_validation.json:
          cache: false

  features:
    cmd: python mlops/pipelines/03_features.py
    deps:
      - mlops/pipelines/03_features.py
      - data/raw
      - backend/analytics/ml/features.py
      - backend/analytics/ml/labels.py
      - backend/analytics/ml/schemas.py
      - reports/data_validation.json
    params:
      - mlops/config/mlops.yaml:
          - dropout.lookback_days
    outs:
      - data/processed/dropout_features.parquet
      - data/processed/feature_manifest.json:
          cache: false

  drift:
    cmd: python mlops/monitoring/drift.py
    deps:
      - mlops/monitoring/drift.py
      - data/processed/dropout_features.parquet
    params:
      - mlops/config/mlops.yaml:
          - monitoring
    outs:
      - reports/drift_report.json:
          cache: false

  train_dropout:
    cmd: python mlops/pipelines/04_train_dropout.py
    deps:
      - mlops/pipelines/04_train_dropout.py
      - data/processed/dropout_features.parquet
      - backend/analytics/ml/schemas.py
    params:
      - mlops/config/mlops.yaml:
          - dropout
          - mlflow
    outs:
      - models/dropout/dropout_model.pkl
      - models/dropout/dropout_scaler.pkl
    metrics:
      - metrics/dropout_metrics.json:
          cache: false

  train_style:
    cmd: python mlops/pipelines/05_train_style.py
    deps:
      - mlops/pipelines/05_train_style.py
      - data/processed/dropout_features.parquet
    params:
      - mlops/config/mlops.yaml:
          - learning_style
          - mlflow
    outs:
      - models/style/kmeans.pkl
    metrics:
      - metrics/style_metrics.json:
          cache: false

  train_recommender:
    cmd: python mlops/pipelines/06_train_recommender.py
    deps:
      - mlops/pipelines/06_train_recommender.py
      - data/raw
    params:
      - mlops/config/mlops.yaml:
          - recommender
          - mlflow
    outs:
      - models/recommender/hybrid.pkl
    metrics:
      - metrics/recommender_metrics.json:
          cache: false

  register:
    cmd: python mlops/pipelines/08_registrer.py
    deps:
      - mlops/pipelines/08_registrer.py
      - metrics/dropout_metrics.json
      - models/dropout/dropout_model.pkl
