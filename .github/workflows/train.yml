name: retrain

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force rerun all stages"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'mlops/**'
      - 'dvc.yaml'
      - 'backend/analytics/ml/**'

permissions:
  contents: write

jobs:
  retrain:
    runs-on: self-hosted
    timeout-minutes: 90
    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -File "{0}"
    env:
      DJANGO_SETTINGS_MODULE: core.settings
      MLFLOW_TRACKING_URI: file:./mlruns
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load ENV_FILE secret into GITHUB_ENV
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          Write-Host "ENV_FILE length: $($env:ENV_FILE.Length)"
          if ([string]::IsNullOrEmpty($env:ENV_FILE)) {
            Write-Error "ENV_FILE secret is empty or not set. Create it at Repo Settings -> Secrets and variables -> Actions."
            exit 1
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD\.env", $env:ENV_FILE, $utf8NoBom)
          Copy-Item .env backend/.env -Force

          $sb = New-Object System.Text.StringBuilder
          $count = 0
          $keys = @()
          foreach ($line in $env:ENV_FILE -split "`r?`n") {
            $trimmed = $line.Trim()
            if ($trimmed -eq "" -or $trimmed.StartsWith("#")) { continue }
            $idx = $trimmed.IndexOf("=")
            if ($idx -lt 1) { continue }
            $key = $trimmed.Substring(0, $idx).Trim()
            $val = $trimmed.Substring($idx + 1).Trim().Trim('"').Trim("'")
            [void]$sb.AppendLine("$key=$val")
            $keys += $key
            $count++
          }
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, $sb.ToString(), $utf8NoBom)
          Write-Host "Loaded $count env vars: $($keys -join ', ')"

      - name: Verify env vars loaded
        run: |
          $hasKey = -not [string]::IsNullOrEmpty($env:SECRET_KEY)
          Write-Host "SECRET_KEY set: $hasKey"
          Write-Host "DB_NAME set: $(-not [string]::IsNullOrEmpty($env:DB_NAME))"
          Write-Host ".env exists at repo root: $(Test-Path .env)"
          Write-Host ".env exists at backend/: $(Test-Path backend/.env)"
          if (-not $hasKey) {
            Write-Error "SECRET_KEY not in environment. ENV_FILE secret missing or malformed."
            Write-Host "--- repo root .env (first 3 lines, redacted) ---"
            if (Test-Path .env) { (Get-Content .env -TotalCount 3) -replace '=.*','=***' }
            exit 1
          }

      - name: Verify DVC
        run: |
          dvc --version
          dvc status

      - name: Pull data from DVC remote
        continue-on-error: true
        run: dvc pull --allow-missing

      - name: Run pipeline
        run: |
          if ("${{ inputs.force }}" -eq "true") {
            dvc repro --force
          } else {
            dvc repro --pull
          }

      - name: Promote model if gates pass
        run: python mlops/pipelines/08_registrer.py

      - name: Push DVC artifacts
        if: success()
        continue-on-error: true
        run: dvc push

      - name: Commit dvc.lock + metrics
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: retrain artifacts [skip ci]"
          file_pattern: "dvc.lock metrics/ reports/"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts-${{ github.run_number }}
          path: |
            metrics/
            reports/
          retention-days: 7
